    <h3 class="topheading">Save your time and money with easy booking and premium flights.</h3>

    <main>
        <div class="bookingbox">
            <img style="height: 50px;"src="logo2.png" alt="logo2">
            <h3 class="fontmain">Where you want to go?</h3>
            <form>
                <label class="formitem" for="from">From Place :</label>
                <input class="formitem" type="text" placeholder="Eg- Chennai">
                <br>
                <label class="formitem" for="to">Destination:</label>
                <input class="formitem" type="text" placeholder="Eg- Dubai">
                <br>
                <button id="formbutton" class="formitem" >Search</button>
            </form>

        </div>
        <div class="sidebar">
            <button class="sidebuttons">Flight Tracker</button>
            <button class="sidebuttons">Visa Checker</button>
            <button class="sidebuttons">Book Hotels</button>
            <button class="sidebuttons">Food Facilities</button>
        </div>
    </main>
